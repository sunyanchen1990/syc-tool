# 可选：打 tag 时由 CI 构建。日常发布更快：npm run release:local（复用 release/mac-arm64/*.app，约十几秒出 DMG）
name: Release macOS

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        env:
          npm_config_electron_mirror: ""
      - run: npm run build:electron
      - run: chmod +x "build/安装 SYC-TOOL.command" scripts/codesign-adhoc.sh
      - run: npx electron-builder --mac --dir
        env:
          npm_config_electron_mirror: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - run: bash scripts/codesign-adhoc.sh release/mac-arm64/SYC-TOOL.app
      - run: npx electron-builder --mac --prepackaged release/mac-arm64/SYC-TOOL.app --publish never
        env:
          npm_config_electron_mirror: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Compute DMG SHA256 for Homebrew Cask
        id: sha
        run: |
          DMG=(release/SYC-TOOL-*-arm64.dmg)
          echo "sha256=$(shasum -a 256 "${DMG[0]}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Cask checksum
        run: |
          SHA="${{ steps.sha.outputs.sha256 }}"
          VER="${{ steps.sha.outputs.version }}"
          sed -i '' "s/version \".*\"/version \"${VER}\"/" Casks/syc-tool.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/syc-tool.rb

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
          generate_release_notes: true

      - name: Commit updated Cask (optional sync)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/syc-tool.rb
          git diff --staged --quiet || git commit -m "chore: update Homebrew cask for v${{ steps.sha.outputs.version }}"
          git push origin HEAD:main || true
