name: Release macOS

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Import signing certificate
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [[ -z "${MAC_CERT_P12_BASE64:-}" ]]; then
            echo "未配置 MAC_CERT_P12_BASE64，将使用 ad-hoc 签名（用户需双击安装助手）"
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$MAC_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"

      - run: npm ci
      - run: npm run build:electron
      - run: chmod +x "build/双击安装 SYC-TOOL.command" "build/安装 SYC-TOOL.command" scripts/*.sh

      - name: Build and package
        run: |
          if [[ -n "${CSC_LINK:-}" ]]; then
            npx electron-builder --mac --publish never -c.mac.notarize=true
          else
            npx electron-builder --mac --dir
            bash scripts/codesign-adhoc.sh release/mac-arm64/SYC-TOOL.app
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --prepackaged release/mac-arm64/SYC-TOOL.app --publish never
          fi

      - run: bash scripts/prepare-release-assets.sh

      - name: Compute DMG SHA256
        id: sha
        run: |
          DMG=(release/SYC-TOOL-*-arm64.dmg)
          echo "sha256=$(shasum -a 256 "${DMG[0]}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Cask checksum
        run: |
          SHA="${{ steps.sha.outputs.sha256 }}"
          VER="${{ steps.sha.outputs.version }}"
          sed -i '' "s/version \".*\"/version \"${VER}\"/" Casks/syc-tool.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/syc-tool.rb

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
          generate_release_notes: true

      - name: Commit updated Cask
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/syc-tool.rb
          git diff --staged --quiet || git commit -m "chore: update Homebrew cask for v${{ steps.sha.outputs.version }}"
          git push origin HEAD:main || true
